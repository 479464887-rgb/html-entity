<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HTML Entity Encoder - DevKit</title><meta name="description" content="在线 HTML 实体编解码工具 - 转义/反转义 HTML 特殊字符"><style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}
header .badge{font-size:10px;background:#daa520;color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px}
main{max-width:700px;margin:0 auto;padding:32px 24px;flex:1}
.tool-wrapper{padding:20px 0}
footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}
footer a{color:#58a6ff;text-decoration:none;margin:0 8px}
.btn-primary:hover{background:#2ea043!important}.btn:hover{background:#30363d!important}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff!important}
.btn{font-family:inherit}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div><div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div></header><main><h1 style="font-size:24px;margin-bottom:4px">HTML Entity Encoder</h1><p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线 HTML 实体编解码工具 - 转义/反转义 HTML 特殊字符</p><div class="tool-wrapper"><div style="display:flex;gap:4px;margin-bottom:12px"><button class="tab-btn active" onclick="switchTab('encode')" id="tab-encode" style="flex:1;padding:10px;border:1px solid #58a6ff;border-radius:6px 6px 0 0;background:#1a2230;color:#58a6ff;cursor:pointer;font-size:13px;font-weight:600">🔒 编码 (Encode)</button><button class="tab-btn" onclick="switchTab('decode')" id="tab-decode" style="flex:1;padding:10px;border:1px solid #30363d;border-radius:6px 6px 0 0;background:#161b22;color:#8b949e;cursor:pointer;font-size:13px;font-weight:600">🔓 解码 (Decode)</button></div><textarea id="he-input" placeholder='输入 HTML 代码...' rows="8" style="width:100%;padding:16px;font-size:14px;border:1px solid #30363d;border-radius:0 0 8px 8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6;min-height:200px"></textarea><div style="display:flex;gap:8px;margin:12px 0"><button class="btn btn-primary" style="flex:1;padding:10px;background:#238636;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600" onclick="processHE()" id="he-action">🔒 编码</button><button class="btn" style="padding:10px 20px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;cursor:pointer;font-size:13px" onclick="copyHE()">📋 复制</button></div><textarea id="he-output" placeholder="结果..." readonly rows="8" style="width:100%;padding:16px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6;min-height:200px"></textarea></div></main><footer><a href="https://github.com/479464887-rgb/html-entity">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>let mode='encode';const entities={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function switchTab(m){mode=m;document.querySelectorAll('.tab-btn').forEach(b=>{b.style.borderColor='#30363d';b.style.background='#161b22';b.style.color='#8b949e'});const t=document.getElementById('tab-'+m);t.style.borderColor='#58a6ff';t.style.background='#1a2230';t.style.color='#58a6ff';document.getElementById('he-action').textContent=m==='encode'?'🔒 编码':'🔓 解码'}
function processHE(){const inp=document.getElementById('he-input').value;if(!inp)return;if(mode==='encode'){document.getElementById('he-output').value=inp.replace(/[&<>"']/g,c=>entities[c])}else{const d=document.createElement('textarea');d.innerHTML=inp;document.getElementById('he-output').value=d.value}}
function copyHE(){navigator.clipboard.writeText(document.getElementById('he-output').value)}
</script></body></html>
